version: '3.8'

services:
  hyperframes-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hyperframes-server
    restart: unless-stopped

    # Resolve o problema de PID 1 e processos zumbi do Chromium
    init: true

    ports:
      - '3030:3030'
      - '3031:3031'

    # Memória compartilhada — obrigatório para o Chromium não crashar
    shm_size: '2gb'

    environment:
      - NODE_ENV=production
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      # URL pública da porta do preview studio — DEVE ser o IP/domínio acessível
      # pelo navegador do usuário (NÃO localhost). Sobrescreva no painel do Coolify.
      # Ex: http://meu-vps.com:3031 ou http://<IP_DO_VPS>:3031
      - PUBLIC_PREVIEW_URL=${PUBLIC_PREVIEW_URL:-http://100.121.2.102:3031}
      # A Studio do hyperframes faz bind em 127.0.0.1 por padrão; dentro do container
      # isso a torna inalcançável pelo port-mapping do Docker. 0.0.0.0 expõe em todas
      # as interfaces para que a porta 3031 publicada funcione.
      - HYPERFRAMES_PREVIEW_HOST=0.0.0.0

    volumes:
      # Persiste os jobs em andamento entre restarts
      - hf_jobs:/tmp/hf-jobs
      # Persiste os previews entre restarts
      - hf_previews:/tmp/hf-previews

    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3030/health').then(r => r.ok ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  hf_jobs:
  hf_previews:
